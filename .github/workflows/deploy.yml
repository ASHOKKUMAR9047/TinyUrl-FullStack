name: TinyURL CI/CD Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: Restore NuGet packages (Backend API)
      run: dotnet restore backend/TinyUrl.Api/TinyUrl.Api.csproj

    - name: Build Web API
      run: dotnet build backend/TinyUrl.Api/TinyUrl.Api.csproj --configuration Release --no-restore

  build-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install NPM dependencies
      working-directory: ./frontend
      run: npm install

    - name: Build React Vite Frontend
      working-directory: ./frontend
      run: npm run build
